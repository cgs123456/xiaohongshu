server:
  port: 8080
spring:
  application:
    name: redbook-service-user
  cloud:
    nacos:
      discovery:
        server-addr: 123.206.101.247:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://121.37.250.15:3306/rb_user?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
  redis:
    host: 121.37.250.15
    port: 6379
    password: ${REDIS_PASSWORD:your_redis_password}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  rabbitmq:
    host: 123.206.101.247
    port: 5672
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:your_rabbitmq_password}
    virtual-host: /
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
oss:
  endpoint: oss-cn-hangzhou.aliyuncs.com
  accessKeyId: ${OSS_ACCESS_KEY_ID:your-access-key-id}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
  bucketName: ${OSS_BUCKET_NAME:your-bucket-name}
